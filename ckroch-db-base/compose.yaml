name: ckroch_db_base

# Brokered CockroachDB logical-replica lab.
#
# CockroachDB native clustering needs direct peer TCP and is therefore not used
# in this base project. Each Cockroach container runs `start-single-node`; relays
# apply the shared NATS command stream to their local SQL endpoint.
x-cloudflared-external: &cloudflared-external
  image: cloudflare/cloudflared:latest
  restart: unless-stopped
  command:
    - tunnel
    - --no-autoupdate
    - --loglevel
    - info
    - run
    - --token-file
    - /run/secrets/cf_token_external
  secrets:
    - cf_token_external
  environment:
    PUBLIC_URL: ${CLOUDFLARE_URL_EXTERNAL}

x-cockroach: &cockroach
  image: cockroachdb/cockroach:latest
  user: "0:0"
  expose:
    - "26257"
    - "8080"

services:
  event-bus:
    # Durable operation log replacing native Cockroach inter-node RPC.
    image: nats:2-alpine
    user: "0:0"
    command: ["-js", "-sd", "/data"]
    expose:
      - "4222"
    volumes:
      - ../_volumes/ckroch-db-base/bus/nats:/data
    networks:
      - bus_net

  gateway:
    # Client ingress origin. It talks to NATS only.
    build:
      context: .
      dockerfile: brokered/Dockerfile
    command: ["python", "-m", "brokered.gateway"]
    environment:
      NATS_URL: nats://event-bus:4222
      MIN_APPLY_ACKS: "2"
      PORT: "8080"
    expose:
      - "8080"
    depends_on:
      - event-bus
    networks:
      - bus_net
      - ingress_net

  cloudflared-external:
    <<: *cloudflared-external
    profiles: ["edge"]
    network_mode: "service:gateway"
    depends_on:
      - gateway

  ckroch1:
    # Isolated single-node Cockroach store. No direct peer routes.
    <<: *cockroach
    hostname: ckroch1
    command:
      - start-single-node
      - --insecure
      - --http-addr=ckroch1:8080
      - --store=/cockroach/cockroach-data
    volumes:
      - ../_volumes/ckroch-db-base/worker1/cockroach:/cockroach/cockroach-data
    networks:
      - node1_net

  ckroch2:
    <<: *cockroach
    hostname: ckroch2
    command:
      - start-single-node
      - --insecure
      - --http-addr=ckroch2:8080
      - --store=/cockroach/cockroach-data
    volumes:
      - ../_volumes/ckroch-db-base/worker2/cockroach:/cockroach/cockroach-data
    networks:
      - node2_net

  ckroch3:
    <<: *cockroach
    hostname: ckroch3
    command:
      - start-single-node
      - --insecure
      - --http-addr=ckroch3:8080
      - --store=/cockroach/cockroach-data
    volumes:
      - ../_volumes/ckroch-db-base/worker3/cockroach:/cockroach/cockroach-data
    networks:
      - node3_net

  relay1:
    # Relay attached to bus_net and node1_net only.
    build:
      context: .
      dockerfile: brokered/Dockerfile
    command: ["python", "-m", "brokered.relay"]
    environment:
      ENGINE: cockroach
      NODE_ID: node1
      NATS_URL: nats://event-bus:4222
      LOCAL_DB_DSN: postgresql://root@ckroch1:26257/defaultdb?sslmode=disable
    depends_on:
      - event-bus
      - ckroch1
    networks:
      - bus_net
      - node1_net

  relay2:
    build:
      context: .
      dockerfile: brokered/Dockerfile
    command: ["python", "-m", "brokered.relay"]
    environment:
      ENGINE: cockroach
      NODE_ID: node2
      NATS_URL: nats://event-bus:4222
      LOCAL_DB_DSN: postgresql://root@ckroch2:26257/defaultdb?sslmode=disable
    depends_on:
      - event-bus
      - ckroch2
    networks:
      - bus_net
      - node2_net

  relay3:
    build:
      context: .
      dockerfile: brokered/Dockerfile
    command: ["python", "-m", "brokered.relay"]
    environment:
      ENGINE: cockroach
      NODE_ID: node3
      NATS_URL: nats://event-bus:4222
      LOCAL_DB_DSN: postgresql://root@ckroch3:26257/defaultdb?sslmode=disable
    depends_on:
      - event-bus
      - ckroch3
    networks:
      - bus_net
      - node3_net

  client:
    profiles: ["test"]
    build:
      context: .
      dockerfile: brokered/Dockerfile
    command: ["python", "-m", "brokered.client", "e2e"]
    environment:
      API_URL: http://gateway:8080
    depends_on:
      - gateway
    networks:
      - ingress_net

  persistence-client:
    profiles: ["test"]
    image: python:3.12-slim
    working_dir: /scripts
    command: ["python", "/scripts/persistence_check.py"]
    environment:
      API_URL: http://gateway:8080
      LAB_NAME: ckroch-db-base
    depends_on:
      - gateway
    volumes:
      - ./scripts:/scripts:ro
    networks:
      - ingress_net

networks:
  ingress_net:
  bus_net:
  node1_net:
  node2_net:
  node3_net:

secrets:
  cf_token_external:
    environment: CLOUDFLARE_TOKEN_EXTERNAL
