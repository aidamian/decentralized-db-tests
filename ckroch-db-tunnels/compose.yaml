name: ckroch_db_tunnels

# Native CockroachDB-over-Cloudflare TCP experiment.
#
# This is the last-resort variant. CockroachDB inter-node RPC remains TCP, but
# peer names resolve to local `cloudflared access tcp` sidecars instead of a
# shared Docker network between DB containers.
x-cloudflared-run: &cloudflared-run
  image: cloudflare/cloudflared:latest
  restart: unless-stopped

x-cloudflared-access: &cloudflared-access
  # Wrapper normalizes CLOUDFLARE_URL_N to a bare hostname, then execs:
  # cloudflared access tcp --hostname <host> --url <LOCAL_ACCESS_LISTEN>
  build:
    context: .
    dockerfile: access/Dockerfile
  restart: unless-stopped

x-cockroach: &cockroach
  image: cockroachdb/cockroach:latest
  user: "0:0"
  command:
    - start
    - --insecure
    - --listen-addr=ckroch1:26357
    - --advertise-addr=ckroch1-peer:26357
    - --sql-addr=ckroch1:26257
    - --http-addr=ckroch1:8080
    - --join=ckroch1-peer:26357,ckroch2-peer:26357,ckroch3-peer:26357
    - --store=/cockroach/cockroach-data
  expose:
    - "26257"
    - "26357"
    - "8080"

services:
  gateway:
    # Client ingress origin for the external Cloudflare tunnel.
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      LOCAL_DB_DSN: postgresql://root@ckroch1:26257/defaultdb?sslmode=disable
      PORT: "8080"
    expose:
      - "8080"
    networks:
      - ingress_net
      - node1_net

  cloudflared-external:
    <<: *cloudflared-run
    command:
      - tunnel
      - --no-autoupdate
      - --loglevel
      - info
      - run
      - --token-file
      - /run/secrets/cf_token
      - --url
      - http://127.0.0.1:8080
    profiles: ["edge"]
    network_mode: "service:gateway"
    depends_on:
      - gateway
    environment:
      PUBLIC_URL: ${CLOUDFLARE_URL_EXTERNAL}
    secrets:
      - source: cf_token_external
        target: cf_token

  ckroch1:
    # DB node: private network only. Peer aliases point at local TCP proxies.
    <<: *cockroach
    hostname: ckroch1
    command:
      - start
      - --insecure
      - --listen-addr=ckroch1:26357
      - --advertise-addr=ckroch1-peer:26357
      - --sql-addr=ckroch1:26257
      - --http-addr=ckroch1:8080
      - --join=ckroch1-peer:26357,ckroch2-peer:26357,ckroch3-peer:26357
      - --store=/cockroach/cockroach-data
    volumes:
      - ../_volumes/ckroch-db-tunnels/worker1/cockroach:/cockroach/cockroach-data
    networks:
      node1_net:
        aliases:
          - ckroch1-peer

  cloudflared-node1:
    <<: *cloudflared-run
    command:
      - tunnel
      - --no-autoupdate
      - --loglevel
      - info
      - run
      - --token-file
      - /run/secrets/cf_token
      - --url
      - tcp://127.0.0.1:26357
    profiles: ["edge", "node-direct"]
    network_mode: "service:ckroch1"
    depends_on:
      - ckroch1
    environment:
      PUBLIC_URL: ${CLOUDFLARE_URL_1}
    secrets:
      - source: cf_token_1
        target: cf_token

  node1-to-node2:
    # Local proxy inside node1_net that dials node2 through Cloudflare Access.
    <<: *cloudflared-access
    profiles: ["edge", "node-direct"]
    environment:
      CLOUDFLARE_TARGET_HOSTNAME: ${CLOUDFLARE_URL_2}
      LOCAL_ACCESS_LISTEN: 0.0.0.0:26357
    networks:
      node1_net:
        aliases:
          - ckroch2-peer

  node1-to-node3:
    <<: *cloudflared-access
    profiles: ["edge", "node-direct"]
    environment:
      CLOUDFLARE_TARGET_HOSTNAME: ${CLOUDFLARE_URL_3}
      LOCAL_ACCESS_LISTEN: 0.0.0.0:26357
    networks:
      node1_net:
        aliases:
          - ckroch3-peer

  ckroch2:
    <<: *cockroach
    hostname: ckroch2
    command:
      - start
      - --insecure
      - --listen-addr=ckroch2:26357
      - --advertise-addr=ckroch2-peer:26357
      - --sql-addr=ckroch2:26257
      - --http-addr=ckroch2:8080
      - --join=ckroch1-peer:26357,ckroch2-peer:26357,ckroch3-peer:26357
      - --store=/cockroach/cockroach-data
    volumes:
      - ../_volumes/ckroch-db-tunnels/worker2/cockroach:/cockroach/cockroach-data
    networks:
      node2_net:
        aliases:
          - ckroch2-peer

  cloudflared-node2:
    <<: *cloudflared-run
    command:
      - tunnel
      - --no-autoupdate
      - --loglevel
      - info
      - run
      - --token-file
      - /run/secrets/cf_token
      - --url
      - tcp://127.0.0.1:26357
    profiles: ["edge", "node-direct"]
    network_mode: "service:ckroch2"
    depends_on:
      - ckroch2
    environment:
      PUBLIC_URL: ${CLOUDFLARE_URL_2}
    secrets:
      - source: cf_token_2
        target: cf_token

  node2-to-node1:
    <<: *cloudflared-access
    profiles: ["edge", "node-direct"]
    environment:
      CLOUDFLARE_TARGET_HOSTNAME: ${CLOUDFLARE_URL_1}
      LOCAL_ACCESS_LISTEN: 0.0.0.0:26357
    networks:
      node2_net:
        aliases:
          - ckroch1-peer

  node2-to-node3:
    <<: *cloudflared-access
    profiles: ["edge", "node-direct"]
    environment:
      CLOUDFLARE_TARGET_HOSTNAME: ${CLOUDFLARE_URL_3}
      LOCAL_ACCESS_LISTEN: 0.0.0.0:26357
    networks:
      node2_net:
        aliases:
          - ckroch3-peer

  ckroch3:
    <<: *cockroach
    hostname: ckroch3
    command:
      - start
      - --insecure
      - --listen-addr=ckroch3:26357
      - --advertise-addr=ckroch3-peer:26357
      - --sql-addr=ckroch3:26257
      - --http-addr=ckroch3:8080
      - --join=ckroch1-peer:26357,ckroch2-peer:26357,ckroch3-peer:26357
      - --store=/cockroach/cockroach-data
    volumes:
      - ../_volumes/ckroch-db-tunnels/worker3/cockroach:/cockroach/cockroach-data
    networks:
      node3_net:
        aliases:
          - ckroch3-peer

  cloudflared-node3:
    <<: *cloudflared-run
    command:
      - tunnel
      - --no-autoupdate
      - --loglevel
      - info
      - run
      - --token-file
      - /run/secrets/cf_token
      - --url
      - tcp://127.0.0.1:26357
    profiles: ["edge", "node-direct"]
    network_mode: "service:ckroch3"
    depends_on:
      - ckroch3
    environment:
      PUBLIC_URL: ${CLOUDFLARE_URL_3}
    secrets:
      - source: cf_token_3
        target: cf_token

  node3-to-node1:
    <<: *cloudflared-access
    profiles: ["edge", "node-direct"]
    environment:
      CLOUDFLARE_TARGET_HOSTNAME: ${CLOUDFLARE_URL_1}
      LOCAL_ACCESS_LISTEN: 0.0.0.0:26357
    networks:
      node3_net:
        aliases:
          - ckroch1-peer

  node3-to-node2:
    <<: *cloudflared-access
    profiles: ["edge", "node-direct"]
    environment:
      CLOUDFLARE_TARGET_HOSTNAME: ${CLOUDFLARE_URL_2}
      LOCAL_ACCESS_LISTEN: 0.0.0.0:26357
    networks:
      node3_net:
        aliases:
          - ckroch2-peer

  cockroach-init:
    image: cockroachdb/cockroach:latest
    profiles: ["edge"]
    entrypoint: ["/bin/sh", "-ec"]
    environment:
      COCKROACH_INIT_ATTEMPTS: ${COCKROACH_INIT_ATTEMPTS:-12}
      COCKROACH_INIT_TIMEOUT_SECONDS: ${COCKROACH_INIT_TIMEOUT_SECONDS:-10}
    command:
      - |
        attempts="$${COCKROACH_INIT_ATTEMPTS:-12}"
        attempt_timeout="$${COCKROACH_INIT_TIMEOUT_SECONDS:-10}s"
        for attempt in $(seq 1 "$${attempts}"); do
          if timeout "$${attempt_timeout}" cockroach init --insecure --host=ckroch1:26257 > /tmp/cockroach-init.log 2>&1; then
            cat /tmp/cockroach-init.log
            exit 0
          fi
          cat /tmp/cockroach-init.log
          if grep -qi 'already' /tmp/cockroach-init.log; then
            exit 0
          fi
          echo "waiting for CockroachDB cluster init attempt $${attempt}" >&2
          sleep 2
        done
        echo "CockroachDB cluster init did not complete" >&2
        exit 1
    depends_on:
      - ckroch1
      - ckroch2
      - ckroch3
    networks:
      - node1_net

  persistence-client:
    profiles: ["test"]
    image: python:3.12-slim
    working_dir: /scripts
    command: ["python", "/scripts/persistence_check.py"]
    environment:
      API_URL: http://gateway:8080
      LAB_NAME: ckroch-db-tunnels
    depends_on:
      gateway:
        condition: service_started
      cockroach-init:
        condition: service_completed_successfully
    volumes:
      - ./scripts:/scripts:ro
    networks:
      - ingress_net

networks:
  ingress_net:
  node1_net:
  node2_net:
  node3_net:

secrets:
  cf_token_external:
    environment: CLOUDFLARE_TOKEN_EXTERNAL
  cf_token_1:
    environment: CLOUDFLARE_TOKEN_1
  cf_token_2:
    environment: CLOUDFLARE_TOKEN_2
  cf_token_3:
    environment: CLOUDFLARE_TOKEN_3
