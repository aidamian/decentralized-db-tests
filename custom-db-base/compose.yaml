name: custom_db_base

# Brokered custom database lab.
#
# The DB containers (`custom-node1..3`) never share a network. Each node has a
# relay sidecar on its private node network plus the shared NATS bus network.
# The gateway publishes commands to NATS and waits for relay acknowledgements;
# it never opens a direct TCP connection to a DB node.
x-cloudflared-external: &cloudflared-external
  image: cloudflare/cloudflared:latest
  restart: unless-stopped
  command:
    - tunnel
    - --no-autoupdate
    - --loglevel
    - info
    - run
    - --token-file
    - /run/secrets/cf_token_external
  secrets:
    - cf_token_external
  environment:
    PUBLIC_URL: ${CLOUDFLARE_URL_EXTERNAL}

services:
  event-bus:
    # Durable operation log used instead of DB-node peer networking.
    image: nats:2-alpine
    user: "0:0"
    command: ["-js", "-sd", "/data"]
    expose:
      - "4222"
    volumes:
      - ../_volumes/custom-db-base/bus/nats:/data
    networks:
      - bus_net

  gateway:
    # Client ingress origin. Cloudflare external tunnel points here.
    build:
      context: .
      dockerfile: brokered/Dockerfile
    command: ["python", "-m", "brokered.gateway"]
    environment:
      NATS_URL: nats://event-bus:4222
      MIN_APPLY_ACKS: "2"
      PORT: "8080"
    expose:
      - "8080"
    depends_on:
      - event-bus
    networks:
      - bus_net
      - ingress_net

  cloudflared-external:
    # Disabled unless `--profile edge` is selected. It shares the gateway
    # network namespace so Cloudflare reaches the gateway on localhost.
    <<: *cloudflared-external
    profiles: ["edge"]
    network_mode: "service:gateway"
    depends_on:
      - gateway

  custom-node1:
    # DB node: private network only, no bus and no host ports.
    build:
      context: .
      dockerfile: custom/node/Dockerfile
    environment:
      NODE_ID: node1
      DB_PATH: /data/node.db
      PORT: "8080"
    expose:
      - "8080"
    volumes:
      - ../_volumes/custom-db-base/worker1/data:/data
    networks:
      - node1_net

  custom-node2:
    build:
      context: .
      dockerfile: custom/node/Dockerfile
    environment:
      NODE_ID: node2
      DB_PATH: /data/node.db
      PORT: "8080"
    expose:
      - "8080"
    volumes:
      - ../_volumes/custom-db-base/worker2/data:/data
    networks:
      - node2_net

  custom-node3:
    build:
      context: .
      dockerfile: custom/node/Dockerfile
    environment:
      NODE_ID: node3
      DB_PATH: /data/node.db
      PORT: "8080"
    expose:
      - "8080"
    volumes:
      - ../_volumes/custom-db-base/worker3/data:/data
    networks:
      - node3_net

  relay1:
    # Relay: bridge between NATS and only custom-node1's local HTTP API.
    build:
      context: .
      dockerfile: brokered/Dockerfile
    command: ["python", "-m", "brokered.relay"]
    environment:
      ENGINE: custom
      NODE_ID: node1
      NATS_URL: nats://event-bus:4222
      LOCAL_HTTP_URL: http://custom-node1:8080
    depends_on:
      - event-bus
      - custom-node1
    networks:
      - bus_net
      - node1_net

  relay2:
    build:
      context: .
      dockerfile: brokered/Dockerfile
    command: ["python", "-m", "brokered.relay"]
    environment:
      ENGINE: custom
      NODE_ID: node2
      NATS_URL: nats://event-bus:4222
      LOCAL_HTTP_URL: http://custom-node2:8080
    depends_on:
      - event-bus
      - custom-node2
    networks:
      - bus_net
      - node2_net

  relay3:
    build:
      context: .
      dockerfile: brokered/Dockerfile
    command: ["python", "-m", "brokered.relay"]
    environment:
      ENGINE: custom
      NODE_ID: node3
      NATS_URL: nats://event-bus:4222
      LOCAL_HTTP_URL: http://custom-node3:8080
    depends_on:
      - event-bus
      - custom-node3
    networks:
      - bus_net
      - node3_net

  client:
    profiles: ["test"]
    build:
      context: .
      dockerfile: brokered/Dockerfile
    command: ["python", "-m", "brokered.client", "e2e"]
    environment:
      API_URL: http://gateway:8080
    depends_on:
      - gateway
    networks:
      - ingress_net

  persistence-client:
    profiles: ["test"]
    image: python:3.12-slim
    working_dir: /scripts
    command: ["python", "/scripts/persistence_check.py"]
    environment:
      API_URL: http://gateway:8080
      LAB_NAME: custom-db-base
    depends_on:
      - gateway
    volumes:
      - ./scripts:/scripts:ro
    networks:
      - ingress_net

networks:
  ingress_net:
  bus_net:
  node1_net:
  node2_net:
  node3_net:

secrets:
  cf_token_external:
    environment: CLOUDFLARE_TOKEN_EXTERNAL
