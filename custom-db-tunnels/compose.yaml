name: custom_db_tunnels

# Custom DB Cloudflare tunnel lab.
#
# The gateway gets node URLs from `.env` and reaches nodes through Cloudflare.
# Each `cloudflared-nodeN` sidecar shares only its node's network namespace, so
# the node origin is local to that tunnel connector and not reachable from other
# DB-node containers through Docker networking.
x-cloudflared: &cloudflared
  image: cloudflare/cloudflared:latest
  restart: unless-stopped

services:
  gateway:
    # Client-facing API origin for CLOUDFLARE_TOKEN_EXTERNAL.
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      NODE_URLS: ${CLOUDFLARE_URL_1},${CLOUDFLARE_URL_2},${CLOUDFLARE_URL_3}
      NODE_TIMEOUT_SECONDS: "5"
      MIN_APPLY_ACKS: "2"
      PORT: "8080"
    expose:
      - "8080"
    networks:
      - ingress_net

  cloudflared-external:
    <<: *cloudflared
    command:
      - tunnel
      - --no-autoupdate
      - --loglevel
      - info
      - run
      - --token-file
      - /run/secrets/cf_token
      - --url
      - http://127.0.0.1:8080
    profiles: ["edge"]
    network_mode: "service:gateway"
    depends_on:
      - gateway
    environment:
      PUBLIC_URL: ${CLOUDFLARE_URL_EXTERNAL}
    secrets:
      - source: cf_token_external
        target: cf_token

  custom-node1:
    # DB node: private Docker network only.
    build:
      context: .
      dockerfile: custom/node/Dockerfile
    environment:
      NODE_ID: node1
      DB_PATH: /data/node.db
      PORT: "8080"
    expose:
      - "8080"
    volumes:
      - ../_volumes/custom-db-tunnels/worker1/data:/data
    networks:
      - node1_net

  cloudflared-node1:
    # Last-resort direct node tunnel for node1. It is not node-to-node Docker TCP.
    <<: *cloudflared
    command:
      - tunnel
      - --no-autoupdate
      - --loglevel
      - info
      - run
      - --token-file
      - /run/secrets/cf_token
      - --url
      - http://127.0.0.1:8080
    profiles: ["edge", "node-direct"]
    network_mode: "service:custom-node1"
    depends_on:
      - custom-node1
    environment:
      PUBLIC_URL: ${CLOUDFLARE_URL_1}
    secrets:
      - source: cf_token_1
        target: cf_token

  custom-node2:
    build:
      context: .
      dockerfile: custom/node/Dockerfile
    environment:
      NODE_ID: node2
      DB_PATH: /data/node.db
      PORT: "8080"
    expose:
      - "8080"
    volumes:
      - ../_volumes/custom-db-tunnels/worker2/data:/data
    networks:
      - node2_net

  cloudflared-node2:
    <<: *cloudflared
    command:
      - tunnel
      - --no-autoupdate
      - --loglevel
      - info
      - run
      - --token-file
      - /run/secrets/cf_token
      - --url
      - http://127.0.0.1:8080
    profiles: ["edge", "node-direct"]
    network_mode: "service:custom-node2"
    depends_on:
      - custom-node2
    environment:
      PUBLIC_URL: ${CLOUDFLARE_URL_2}
    secrets:
      - source: cf_token_2
        target: cf_token

  custom-node3:
    build:
      context: .
      dockerfile: custom/node/Dockerfile
    environment:
      NODE_ID: node3
      DB_PATH: /data/node.db
      PORT: "8080"
    expose:
      - "8080"
    volumes:
      - ../_volumes/custom-db-tunnels/worker3/data:/data
    networks:
      - node3_net

  cloudflared-node3:
    <<: *cloudflared
    command:
      - tunnel
      - --no-autoupdate
      - --loglevel
      - info
      - run
      - --token-file
      - /run/secrets/cf_token
      - --url
      - http://127.0.0.1:8080
    profiles: ["edge", "node-direct"]
    network_mode: "service:custom-node3"
    depends_on:
      - custom-node3
    environment:
      PUBLIC_URL: ${CLOUDFLARE_URL_3}
    secrets:
      - source: cf_token_3
        target: cf_token

  persistence-client:
    profiles: ["test"]
    image: python:3.12-slim
    working_dir: /scripts
    command: ["python", "/scripts/persistence_check.py"]
    environment:
      API_URL: http://gateway:8080
      LAB_NAME: custom-db-tunnels
    depends_on:
      - gateway
    volumes:
      - ./scripts:/scripts:ro
    networks:
      - ingress_net

networks:
  ingress_net:
  node1_net:
  node2_net:
  node3_net:

secrets:
  cf_token_external:
    environment: CLOUDFLARE_TOKEN_EXTERNAL
  cf_token_1:
    environment: CLOUDFLARE_TOKEN_1
  cf_token_2:
    environment: CLOUDFLARE_TOKEN_2
  cf_token_3:
    environment: CLOUDFLARE_TOKEN_3
