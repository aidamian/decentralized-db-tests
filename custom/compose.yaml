name: ddb_custom

services:
  custom-node1:
    build:
      context: ..
      dockerfile: custom/node/Dockerfile
    environment:
      NODE_ID: node1
      DB_PATH: /data/node.db
      PORT: "8080"
    volumes:
      - custom_node1_data:/data
    expose:
      - "8080"
    networks:
      - custom_node1_net

  custom-node2:
    build:
      context: ..
      dockerfile: custom/node/Dockerfile
    environment:
      NODE_ID: node2
      DB_PATH: /data/node.db
      PORT: "8080"
    volumes:
      - custom_node2_data:/data
    expose:
      - "8080"
    networks:
      - custom_node2_net

  custom-node3:
    build:
      context: ..
      dockerfile: custom/node/Dockerfile
    environment:
      NODE_ID: node3
      DB_PATH: /data/node.db
      PORT: "8080"
    volumes:
      - custom_node3_data:/data
    expose:
      - "8080"
    networks:
      - custom_node3_net

  custom-client:
    profiles: ["test"]
    build:
      context: ..
      dockerfile: custom/client/Dockerfile
    environment:
      NODE_URLS: http://custom-node1:8080,http://custom-node2:8080,http://custom-node3:8080
      NODE_TIMEOUT_SECONDS: "2"
    networks:
      - custom_node1_net
      - custom_node2_net
      - custom_node3_net

networks:
  custom_node1_net:
  custom_node2_net:
  custom_node3_net:

volumes:
  custom_node1_data:
  custom_node2_data:
  custom_node3_data:
