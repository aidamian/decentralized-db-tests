name: ddb_rqlite

x-rqlite-common: &rqlite-common
  image: rqlite/rqlite:10.2.1
  user: "0:0"
  expose:
    - "4001"
    - "4002"
  networks:
    - rqlite_net

services:
  rqlite1:
    <<: *rqlite-common
    hostname: rqlite1
    volumes:
      - rqlite1_data:/rqlite/file/data
    command:
      - rqlited
      - -node-id
      - rqlite1
      - -http-addr
      - rqlite1:4001
      - -raft-addr
      - rqlite1:4002
      - -http-adv-addr
      - rqlite1:4001
      - -raft-adv-addr
      - rqlite1:4002
      - -bootstrap-expect
      - "3"
      - -join
      - rqlite1:4002,rqlite2:4002,rqlite3:4002
      - /rqlite/file/data

  rqlite2:
    <<: *rqlite-common
    hostname: rqlite2
    volumes:
      - rqlite2_data:/rqlite/file/data
    command:
      - rqlited
      - -node-id
      - rqlite2
      - -http-addr
      - rqlite2:4001
      - -raft-addr
      - rqlite2:4002
      - -http-adv-addr
      - rqlite2:4001
      - -raft-adv-addr
      - rqlite2:4002
      - -bootstrap-expect
      - "3"
      - -join
      - rqlite1:4002,rqlite2:4002,rqlite3:4002
      - /rqlite/file/data

  rqlite3:
    <<: *rqlite-common
    hostname: rqlite3
    volumes:
      - rqlite3_data:/rqlite/file/data
    command:
      - rqlited
      - -node-id
      - rqlite3
      - -http-addr
      - rqlite3:4001
      - -raft-addr
      - rqlite3:4002
      - -http-adv-addr
      - rqlite3:4001
      - -raft-adv-addr
      - rqlite3:4002
      - -bootstrap-expect
      - "3"
      - -join
      - rqlite1:4002,rqlite2:4002,rqlite3:4002
      - /rqlite/file/data

  rqlite-client:
    profiles: ["test"]
    build:
      context: ..
      dockerfile: oss-rqlite/client/Dockerfile
    environment:
      NODE_URLS: http://rqlite1:4001,http://rqlite2:4001,http://rqlite3:4001
      NODE_TIMEOUT_SECONDS: "3"
    networks:
      - rqlite_net

networks:
  rqlite_net:

volumes:
  rqlite1_data:
  rqlite2_data:
  rqlite3_data:
