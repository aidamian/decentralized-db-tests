name: rqlite_db_base

x-cloudflared-external: &cloudflared-external
  image: cloudflare/cloudflared:latest
  restart: unless-stopped
  command:
    - tunnel
    - --no-autoupdate
    - --loglevel
    - info
    - run
    - --token-file
    - /run/secrets/cf_token_external
  secrets:
    - cf_token_external
  environment:
    PUBLIC_URL: ${CLOUDFLARE_URL_EXTERNAL}

x-rqlite: &rqlite
  image: rqlite/rqlite:10.2.1
  user: "0:0"
  expose:
    - "4001"
    - "4002"

services:
  event-bus:
    image: nats:2-alpine
    command: ["-js", "-sd", "/data"]
    expose:
      - "4222"
    volumes:
      - nats_data:/data
    networks:
      - bus_net

  gateway:
    build:
      context: .
      dockerfile: brokered/Dockerfile
    command: ["python", "-m", "brokered.gateway"]
    environment:
      NATS_URL: nats://event-bus:4222
      MIN_APPLY_ACKS: "2"
      PORT: "8080"
    expose:
      - "8080"
    depends_on:
      - event-bus
    networks:
      - bus_net
      - ingress_net

  cloudflared-external:
    <<: *cloudflared-external
    profiles: ["edge"]
    network_mode: "service:gateway"
    depends_on:
      - gateway

  rqlite1:
    <<: *rqlite
    hostname: rqlite1
    command:
      - rqlited
      - -node-id
      - rqlite1
      - -http-addr
      - 0.0.0.0:4001
      - -raft-addr
      - 0.0.0.0:4002
      - -http-adv-addr
      - rqlite1:4001
      - -raft-adv-addr
      - rqlite1:4002
      - /rqlite/file/data
    volumes:
      - node1_data:/rqlite/file/data
    networks:
      - node1_net

  rqlite2:
    <<: *rqlite
    hostname: rqlite2
    command:
      - rqlited
      - -node-id
      - rqlite2
      - -http-addr
      - 0.0.0.0:4001
      - -raft-addr
      - 0.0.0.0:4002
      - -http-adv-addr
      - rqlite2:4001
      - -raft-adv-addr
      - rqlite2:4002
      - /rqlite/file/data
    volumes:
      - node2_data:/rqlite/file/data
    networks:
      - node2_net

  rqlite3:
    <<: *rqlite
    hostname: rqlite3
    command:
      - rqlited
      - -node-id
      - rqlite3
      - -http-addr
      - 0.0.0.0:4001
      - -raft-addr
      - 0.0.0.0:4002
      - -http-adv-addr
      - rqlite3:4001
      - -raft-adv-addr
      - rqlite3:4002
      - /rqlite/file/data
    volumes:
      - node3_data:/rqlite/file/data
    networks:
      - node3_net

  relay1:
    build:
      context: .
      dockerfile: brokered/Dockerfile
    command: ["python", "-m", "brokered.relay"]
    environment:
      ENGINE: rqlite
      NODE_ID: node1
      NATS_URL: nats://event-bus:4222
      LOCAL_HTTP_URL: http://rqlite1:4001
    depends_on:
      - event-bus
      - rqlite1
    networks:
      - bus_net
      - node1_net

  relay2:
    build:
      context: .
      dockerfile: brokered/Dockerfile
    command: ["python", "-m", "brokered.relay"]
    environment:
      ENGINE: rqlite
      NODE_ID: node2
      NATS_URL: nats://event-bus:4222
      LOCAL_HTTP_URL: http://rqlite2:4001
    depends_on:
      - event-bus
      - rqlite2
    networks:
      - bus_net
      - node2_net

  relay3:
    build:
      context: .
      dockerfile: brokered/Dockerfile
    command: ["python", "-m", "brokered.relay"]
    environment:
      ENGINE: rqlite
      NODE_ID: node3
      NATS_URL: nats://event-bus:4222
      LOCAL_HTTP_URL: http://rqlite3:4001
    depends_on:
      - event-bus
      - rqlite3
    networks:
      - bus_net
      - node3_net

  client:
    profiles: ["test"]
    build:
      context: .
      dockerfile: brokered/Dockerfile
    command: ["python", "-m", "brokered.client", "e2e"]
    environment:
      API_URL: http://gateway:8080
    depends_on:
      - gateway
    networks:
      - ingress_net

networks:
  ingress_net:
  bus_net:
  node1_net:
  node2_net:
  node3_net:

volumes:
  nats_data:
  node1_data:
  node2_data:
  node3_data:

secrets:
  cf_token_external:
    environment: CLOUDFLARE_TOKEN_EXTERNAL
