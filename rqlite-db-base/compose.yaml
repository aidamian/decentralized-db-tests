name: rqlite_db_base

# Brokered rqlite logical-replica lab.
#
# These rqlite containers are intentionally single-node stores. There is no
# rqlite Raft join here because native Raft requires direct peer TCP. Relays
# consume one NATS command stream and apply the same SQL to each isolated local
# rqlite HTTP API.
x-cloudflared-external: &cloudflared-external
  image: cloudflare/cloudflared:latest
  restart: unless-stopped
  command:
    - tunnel
    - --no-autoupdate
    - --loglevel
    - info
    - run
    - --token-file
    - /run/secrets/cf_token_external
  secrets:
    - cf_token_external
  environment:
    PUBLIC_URL: ${CLOUDFLARE_URL_EXTERNAL}

x-rqlite: &rqlite
  image: rqlite/rqlite:10.2.1
  user: "0:0"
  expose:
    - "4001"
    - "4002"

services:
  event-bus:
    # Durable operation log replacing native rqlite peer replication.
    image: nats:2-alpine
    user: "0:0"
    command: ["-js", "-sd", "/data"]
    expose:
      - "4222"
    volumes:
      - ../_volumes/rqlite-db-base/bus/nats:/data
    networks:
      - bus_net

  gateway:
    # Client ingress origin. It publishes writes to NATS, not to rqlite nodes.
    build:
      context: .
      dockerfile: brokered/Dockerfile
    command: ["python", "-m", "brokered.gateway"]
    environment:
      NATS_URL: nats://event-bus:4222
      MIN_APPLY_ACKS: "2"
      PORT: "8080"
    expose:
      - "8080"
    depends_on:
      - event-bus
    networks:
      - bus_net
      - ingress_net

  cloudflared-external:
    <<: *cloudflared-external
    profiles: ["edge"]
    network_mode: "service:gateway"
    depends_on:
      - gateway

  rqlite1:
    # Isolated single-node rqlite store. It is not attached to bus_net.
    <<: *rqlite
    hostname: rqlite1
    command:
      - rqlited
      - -node-id
      - rqlite1
      - -http-addr
      - 0.0.0.0:4001
      - -raft-addr
      - 0.0.0.0:4002
      - -http-adv-addr
      - rqlite1:4001
      - -raft-adv-addr
      - rqlite1:4002
      - /rqlite/file/data
    volumes:
      - ../_volumes/rqlite-db-base/worker1/rqlite:/rqlite/file/data
    networks:
      - node1_net

  rqlite2:
    <<: *rqlite
    hostname: rqlite2
    command:
      - rqlited
      - -node-id
      - rqlite2
      - -http-addr
      - 0.0.0.0:4001
      - -raft-addr
      - 0.0.0.0:4002
      - -http-adv-addr
      - rqlite2:4001
      - -raft-adv-addr
      - rqlite2:4002
      - /rqlite/file/data
    volumes:
      - ../_volumes/rqlite-db-base/worker2/rqlite:/rqlite/file/data
    networks:
      - node2_net

  rqlite3:
    <<: *rqlite
    hostname: rqlite3
    command:
      - rqlited
      - -node-id
      - rqlite3
      - -http-addr
      - 0.0.0.0:4001
      - -raft-addr
      - 0.0.0.0:4002
      - -http-adv-addr
      - rqlite3:4001
      - -raft-adv-addr
      - rqlite3:4002
      - /rqlite/file/data
    volumes:
      - ../_volumes/rqlite-db-base/worker3/rqlite:/rqlite/file/data
    networks:
      - node3_net

  relay1:
    # Relay attached to bus_net and node1_net only.
    build:
      context: .
      dockerfile: brokered/Dockerfile
    command: ["python", "-m", "brokered.relay"]
    environment:
      ENGINE: rqlite
      NODE_ID: node1
      NATS_URL: nats://event-bus:4222
      LOCAL_HTTP_URL: http://rqlite1:4001
    depends_on:
      - event-bus
      - rqlite1
    networks:
      - bus_net
      - node1_net

  relay2:
    build:
      context: .
      dockerfile: brokered/Dockerfile
    command: ["python", "-m", "brokered.relay"]
    environment:
      ENGINE: rqlite
      NODE_ID: node2
      NATS_URL: nats://event-bus:4222
      LOCAL_HTTP_URL: http://rqlite2:4001
    depends_on:
      - event-bus
      - rqlite2
    networks:
      - bus_net
      - node2_net

  relay3:
    build:
      context: .
      dockerfile: brokered/Dockerfile
    command: ["python", "-m", "brokered.relay"]
    environment:
      ENGINE: rqlite
      NODE_ID: node3
      NATS_URL: nats://event-bus:4222
      LOCAL_HTTP_URL: http://rqlite3:4001
    depends_on:
      - event-bus
      - rqlite3
    networks:
      - bus_net
      - node3_net

  client:
    profiles: ["test"]
    build:
      context: .
      dockerfile: brokered/Dockerfile
    command: ["python", "-m", "brokered.client", "e2e"]
    environment:
      API_URL: http://gateway:8080
    depends_on:
      - gateway
    networks:
      - ingress_net

  persistence-client:
    profiles: ["test"]
    image: python:3.12-slim
    working_dir: /scripts
    command: ["python", "/scripts/persistence_check.py"]
    environment:
      API_URL: http://gateway:8080
      LAB_NAME: rqlite-db-base
    depends_on:
      - gateway
    volumes:
      - ./scripts:/scripts:ro
    networks:
      - ingress_net

networks:
  ingress_net:
  bus_net:
  node1_net:
  node2_net:
  node3_net:

secrets:
  cf_token_external:
    environment: CLOUDFLARE_TOKEN_EXTERNAL
