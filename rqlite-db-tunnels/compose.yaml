name: rqlite_db_tunnels

# Native rqlite-over-Cloudflare TCP experiment.
#
# This is the last-resort variant. rqlite still uses Raft TCP internally, but
# peer names resolve to local `cloudflared access tcp` sidecars rather than to
# another DB container on a shared Docker network.
x-cloudflared-run: &cloudflared-run
  image: cloudflare/cloudflared:latest
  restart: unless-stopped

x-cloudflared-access: &cloudflared-access
  # Wrapper normalizes CLOUDFLARE_URL_N to a bare hostname, then execs:
  # cloudflared access tcp --hostname <host> --url <LOCAL_ACCESS_LISTEN>
  build:
    context: .
    dockerfile: access/Dockerfile
  restart: unless-stopped

x-rqlite: &rqlite
  image: rqlite/rqlite:10.2.1
  user: "0:0"
  expose:
    - "4001"
    - "4002"

services:
  gateway:
    # Client ingress origin for the external Cloudflare tunnel.
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      RQLITE_HTTP_URL: http://rqlite1:4001
      PORT: "8080"
    expose:
      - "8080"
    networks:
      - ingress_net
      - node1_net

  cloudflared-external:
    <<: *cloudflared-run
    command:
      - tunnel
      - --no-autoupdate
      - --loglevel
      - info
      - run
      - --token-file
      - /run/secrets/cf_token
      - --url
      - http://127.0.0.1:8080
    profiles: ["edge"]
    network_mode: "service:gateway"
    depends_on:
      - gateway
    environment:
      PUBLIC_URL: ${CLOUDFLARE_URL_EXTERNAL}
    secrets:
      - source: cf_token_external
        target: cf_token

  rqlite1:
    # DB node: private network only. Peer aliases point at local TCP proxies.
    <<: *rqlite
    hostname: rqlite1
    command:
      - rqlited
      - -node-id
      - rqlite1
      - -http-addr
      - 0.0.0.0:4001
      - -http-adv-addr
      - rqlite1:4001
      - -raft-addr
      - 0.0.0.0:4002
      - -raft-adv-addr
      - rqlite1-peer:4002
      - -bootstrap-expect
      - "3"
      - -join
      - rqlite1-peer:4002,rqlite2-peer:4002,rqlite3-peer:4002
      - /rqlite/file/data
    volumes:
      - ../_volumes/rqlite-db-tunnels/worker1/rqlite:/rqlite/file/data
    networks:
      node1_net:
        aliases:
          - rqlite1-peer

  cloudflared-node1:
    <<: *cloudflared-run
    command:
      - tunnel
      - --no-autoupdate
      - --loglevel
      - info
      - run
      - --token-file
      - /run/secrets/cf_token
      - --url
      - tcp://127.0.0.1:4002
    profiles: ["edge", "node-direct"]
    network_mode: "service:rqlite1"
    depends_on:
      - rqlite1
    environment:
      PUBLIC_URL: ${CLOUDFLARE_URL_1}
    secrets:
      - source: cf_token_1
        target: cf_token

  node1-to-node2:
    # Local proxy inside node1_net that dials node2 through Cloudflare Access.
    <<: *cloudflared-access
    profiles: ["edge", "node-direct"]
    environment:
      CLOUDFLARE_TARGET_HOSTNAME: ${CLOUDFLARE_URL_2}
      LOCAL_ACCESS_LISTEN: 0.0.0.0:4002
    networks:
      node1_net:
        aliases:
          - rqlite2-peer

  node1-to-node3:
    <<: *cloudflared-access
    profiles: ["edge", "node-direct"]
    environment:
      CLOUDFLARE_TARGET_HOSTNAME: ${CLOUDFLARE_URL_3}
      LOCAL_ACCESS_LISTEN: 0.0.0.0:4002
    networks:
      node1_net:
        aliases:
          - rqlite3-peer

  rqlite2:
    <<: *rqlite
    hostname: rqlite2
    command:
      - rqlited
      - -node-id
      - rqlite2
      - -http-addr
      - 0.0.0.0:4001
      - -http-adv-addr
      - rqlite2:4001
      - -raft-addr
      - 0.0.0.0:4002
      - -raft-adv-addr
      - rqlite2-peer:4002
      - -bootstrap-expect
      - "3"
      - -join
      - rqlite1-peer:4002,rqlite2-peer:4002,rqlite3-peer:4002
      - /rqlite/file/data
    volumes:
      - ../_volumes/rqlite-db-tunnels/worker2/rqlite:/rqlite/file/data
    networks:
      node2_net:
        aliases:
          - rqlite2-peer

  cloudflared-node2:
    <<: *cloudflared-run
    command:
      - tunnel
      - --no-autoupdate
      - --loglevel
      - info
      - run
      - --token-file
      - /run/secrets/cf_token
      - --url
      - tcp://127.0.0.1:4002
    profiles: ["edge", "node-direct"]
    network_mode: "service:rqlite2"
    depends_on:
      - rqlite2
    environment:
      PUBLIC_URL: ${CLOUDFLARE_URL_2}
    secrets:
      - source: cf_token_2
        target: cf_token

  node2-to-node1:
    <<: *cloudflared-access
    profiles: ["edge", "node-direct"]
    environment:
      CLOUDFLARE_TARGET_HOSTNAME: ${CLOUDFLARE_URL_1}
      LOCAL_ACCESS_LISTEN: 0.0.0.0:4002
    networks:
      node2_net:
        aliases:
          - rqlite1-peer

  node2-to-node3:
    <<: *cloudflared-access
    profiles: ["edge", "node-direct"]
    environment:
      CLOUDFLARE_TARGET_HOSTNAME: ${CLOUDFLARE_URL_3}
      LOCAL_ACCESS_LISTEN: 0.0.0.0:4002
    networks:
      node2_net:
        aliases:
          - rqlite3-peer

  rqlite3:
    <<: *rqlite
    hostname: rqlite3
    command:
      - rqlited
      - -node-id
      - rqlite3
      - -http-addr
      - 0.0.0.0:4001
      - -http-adv-addr
      - rqlite3:4001
      - -raft-addr
      - 0.0.0.0:4002
      - -raft-adv-addr
      - rqlite3-peer:4002
      - -bootstrap-expect
      - "3"
      - -join
      - rqlite1-peer:4002,rqlite2-peer:4002,rqlite3-peer:4002
      - /rqlite/file/data
    volumes:
      - ../_volumes/rqlite-db-tunnels/worker3/rqlite:/rqlite/file/data
    networks:
      node3_net:
        aliases:
          - rqlite3-peer

  cloudflared-node3:
    <<: *cloudflared-run
    command:
      - tunnel
      - --no-autoupdate
      - --loglevel
      - info
      - run
      - --token-file
      - /run/secrets/cf_token
      - --url
      - tcp://127.0.0.1:4002
    profiles: ["edge", "node-direct"]
    network_mode: "service:rqlite3"
    depends_on:
      - rqlite3
    environment:
      PUBLIC_URL: ${CLOUDFLARE_URL_3}
    secrets:
      - source: cf_token_3
        target: cf_token

  node3-to-node1:
    <<: *cloudflared-access
    profiles: ["edge", "node-direct"]
    environment:
      CLOUDFLARE_TARGET_HOSTNAME: ${CLOUDFLARE_URL_1}
      LOCAL_ACCESS_LISTEN: 0.0.0.0:4002
    networks:
      node3_net:
        aliases:
          - rqlite1-peer

  node3-to-node2:
    <<: *cloudflared-access
    profiles: ["edge", "node-direct"]
    environment:
      CLOUDFLARE_TARGET_HOSTNAME: ${CLOUDFLARE_URL_2}
      LOCAL_ACCESS_LISTEN: 0.0.0.0:4002
    networks:
      node3_net:
        aliases:
          - rqlite2-peer

  rqlite-leader-init:
    # The gateway has an allowed local HTTP path only to rqlite1. After the
    # native cluster forms, this helper asks rqlite to transfer leadership to
    # rqlite1 so gateway writes do not need a Docker HTTP path to nodes 2/3.
    image: python:3.12-slim
    profiles: ["edge"]
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        python - <<'PY'
        import json
        import time
        import urllib.request

        def current_leader() -> str | None:
            with urllib.request.urlopen("http://rqlite1:4001/leader", timeout=5) as response:
                payload = json.loads(response.read().decode("utf-8"))
            return payload.get("id")

        def transfer_to_node1() -> None:
            payload = json.dumps({"id": "rqlite1"}).encode("utf-8")
            request = urllib.request.Request(
                "http://rqlite1:4001/leader?wait&timeout=30s",
                data=payload,
                headers={"Content-Type": "application/json"},
                method="POST",
            )
            with urllib.request.urlopen(request, timeout=35) as response:
                print(response.read().decode("utf-8", errors="replace"), flush=True)

        last_error = None
        for attempt in range(1, 61):
            try:
                leader = current_leader()
                if leader == "rqlite1":
                    print("rqlite1 is leader", flush=True)
                    raise SystemExit(0)
                transfer_to_node1()
                if current_leader() == "rqlite1":
                    print("rqlite leadership transferred to rqlite1", flush=True)
                    raise SystemExit(0)
                raise RuntimeError("leadership transfer returned without rqlite1 becoming leader")
            except Exception as exc:
                last_error = exc
                print(f"waiting to transfer rqlite leadership to rqlite1: {exc}", flush=True)
                time.sleep(2)
        raise SystemExit(f"could not transfer rqlite leadership to rqlite1: {last_error}")
        PY
    depends_on:
      - rqlite1
      - rqlite2
      - rqlite3
    networks:
      - node1_net

  persistence-client:
    profiles: ["test"]
    image: python:3.12-slim
    working_dir: /scripts
    command: ["python", "/scripts/persistence_check.py"]
    environment:
      API_URL: http://gateway:8080
      LAB_NAME: rqlite-db-tunnels
    depends_on:
      gateway:
        condition: service_started
      rqlite-leader-init:
        condition: service_completed_successfully
    volumes:
      - ./scripts:/scripts:ro
    networks:
      - ingress_net

networks:
  ingress_net:
  node1_net:
  node2_net:
  node3_net:

secrets:
  cf_token_external:
    environment: CLOUDFLARE_TOKEN_EXTERNAL
  cf_token_1:
    environment: CLOUDFLARE_TOKEN_1
  cf_token_2:
    environment: CLOUDFLARE_TOKEN_2
  cf_token_3:
    environment: CLOUDFLARE_TOKEN_3
